<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">

     <link rel="icon" href="https://i.pinimg.com/736x/08/b6/87/08b6877fc77dcac5ede072f168577705.jpg"
    <meta name="description" content="Download premium tweaked iOS apps and modded games safely. The #1 IPA library for iPhone and iPad." />
    
    <!-- Modern Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- PROTECTION CSS --- */
        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        input, textarea {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
        }

        /* --- EXISTING STYLES --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            scroll-behavior: smooth;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: #f59e0b;
            box-shadow: 0 10px 30px -10px rgba(245, 158, 11, 0.3);
        }

        .boss-gradient {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .btn-install {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
            transition: all 0.2s ease;
        }

        .btn-install:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .loading-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        /* Smooth Mobile Menu Animation */
        #mobile-menu {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }
        #mobile-menu.active {
            max-height: 500px;
            opacity: 1;
            padding: 20px 0;
        }
    </style>
</head>

<body class="antialiased min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 w-full bg-[#0f172a]/90 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between py-3">
                <!-- Logo -->
                <a href="#" class="flex items-center gap-3 group">
                    <div class="w-11 h-11 rounded-xl overflow-hidden shadow-lg ring-2 ring-white/10 group-hover:ring-amber-500 transition-all duration-300">
                        <img src="https://i.pinimg.com/736x/b6/36/3a/b6363a1970cfeb3cd725eee9aab9d146.jpg" alt="IRRA IPA Logo" class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    </div>
                    <span class="text-xl md:text-2xl font-black tracking-tight uppercase">
                        Irra <span class="text-amber-500">Ipa</span>
                    </span>
                </a>

                <!-- Desktop Menu -->
                <nav class="hidden md:flex items-center gap-8 font-bold text-xs tracking-widest">
                    <a href="#" class="hover:text-amber-500 transition">HOME</a>
                    <a href="#" class="hover:text-amber-500 transition">GAMES</a>
                    <a href="#" class="hover:text-amber-500 transition text-amber-500">LIBRARY</a>
                    <a href="#" class="hover:text-amber-500 transition">ABOUT</a>
                    <a href="#" class="hover:text-amber-500 transition">CONTACT</a>
                    <a href="#" class="px-4 py-2 rounded-lg border border-amber-500/50 text-amber-500 hover:bg-amber-500 hover:text-black transition duration-300">ADMIN</a>
                </nav>

                <!-- Mobile Hamburger Button -->
                <button id="menu-btn" class="md:hidden text-3xl text-amber-500 focus:outline-none">
                    ☰
                </button>
            </div>

            <!-- Mobile Menu Dropdown
            <div id="mobile-menu" class="md:hidden flex flex-col gap-4 border-t border-white/5">
                <a href="#" class="text-sm font-bold tracking-widest hover:text-amber-500">HOME</a>
                <a href="#" class="text-sm font-bold tracking-widest hover:text-amber-500">GAMES</a>
                <a href="#" class="text-sm font-bold tracking-widest text-amber-500">LIBRARY</a>
                <a href="#" class="text-sm font-bold tracking-widest hover:text-amber-500">ABOUT</a>
                <a href="#" class="text-sm font-bold tracking-widest hover:text-amber-500">CONTACT</a>
                <a href="#" class="text-sm font-bold tracking-widest text-amber-500 underline">ADMIN LOGIN</a>
            </div> -->
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Hero Section -->
        <section class="mb-12 relative overflow-hidden rounded-3xl h-[400px] flex items-end p-8 md:p-12 shadow-2xl">
            <img id="hero-img" src="https://ipaomtk.com/wp-content/uploads/2023/03/esign-ipa.jpg" class="absolute inset-0 w-full h-full object-cover opacity-60">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-[#0f172a]/20 to-transparent"></div>
            <div class="relative z-10 max-w-2xl">
                <span class="boss-gradient text-black text-xs font-extrabold px-3 py-1 rounded-full uppercase mb-4 inline-block tracking-widest">PREMIUM</span>
                <h1 id="hero-title" class="text-5xl md:text-7xl font-black mb-4 leading-none tracking-tighter">Irra<br><span class="text-amber-500">Esign</span></h1>
                <p id="hero-desc" class="text-gray-200 mb-6 text-lg font-medium">Esign ជាកម្មវិធីដំឡើង IPA​​ ​សម្រាប់ iPhone.</p>
                <a id="hero-link" href="https://t.me/irra_11#" class="btn-install px-12 py-4 rounded-2xl font-black text-xl inline-block uppercase tracking-wide">Buy</a>
            </div>
        </section>

        <h2 class="text-3xl font-black mb-8 flex items-center gap-3">
            <span class="w-2 h-8 boss-gradient rounded-full"></span>
            IPA Apps
        </h2>

        <div id="app-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-amber-500 mb-4"></div>
                <p class="text-gray-500 font-bold loading-pulse uppercase tracking-widest text-xs">Connecting to Boss Library...</p>
            </div>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto px-6 py-12 border-t border-white/10 text-center text-gray-500 mt-10">
        <!-- <p class="text-white font-black text-2xl mb-4 tracking-tighter uppercase">IRRA <span class="text-amber-500">IPA</span></p> -->
        <p class="text-xs max-w-xl mx-auto leading-relaxed">© 2026 IRRAIPA. All rights reserved.</p>
    </footer>

    <!-- SOURCE CODE PROTECTION -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
        (function() {
            setInterval(function() {
                (function(a) { return (function(a) { return (Function('Function(arguments[0]+"' + a + '")()')) })(a) })('debugger')('state');
            }, 1000);
        })();
    </script>

    <!-- UI Scripts -->
    <script>
        // Mobile Menu Toggle
        const menuBtn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");

        menuBtn.addEventListener("click", () => {
            mobileMenu.classList.toggle("active");
            // Change icon from ☰ to ✕
            menuBtn.innerHTML = mobileMenu.classList.contains("active") ? "✕" : "☰";
        });

        // App Fetching Logic
        const API_URL = "https://ipa-boss.onrender.com"; 
        async function fetchApps() {
            const grid = document.getElementById('app-grid');
            try {
                const response = await fetch(`${API_URL}/apps`);
                const apps = await response.json();
                if (apps.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-10 text-gray-500">Library Empty.</p>';
                    return;
                }
                let htmlContent = '';
                apps.forEach((app) => {
                    htmlContent += `
                        <div class="glass-card p-5 rounded-3xl flex items-center gap-5 relative" onclick="location.href='${app.download_url}'">
                            <img src="${app.image}" class="w-20 h-20 rounded-2xl shadow-xl object-cover">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-lg truncate">${app.title}</h3>
                                <p class="text-sm text-gray-400 truncate">${app.description}</p>
                                <p class="text-xs text-amber-500 mt-1 font-bold uppercase tracking-wider">${app.tag}</p>
                            </div>
                            <a href="${app.download_url}" class="btn-install px-4 py-2 rounded-xl text-sm font-black uppercase">INSTALL</a>
                        </div>
                    `;
                });
                grid.innerHTML = htmlContent;
            } catch (error) {
                grid.innerHTML = `<p class="col-span-full text-center py-10">Server offline. Try refreshing...</p>`;
            }
        }
        fetchApps();
    </script>
</body>
</html>
